<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOPE | 学生と経営者のビジネス交流会</title>
    <!-- Google Fonts (美しい明朝体) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS (デザイン調整用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#111e38] text-white font-serif min-h-screen flex flex-col">

    <!-- ヘッダーナビゲーション -->
   <header class="sticky top-0 z-50 w-full px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 border-b border-white/10 bg-white/[0.06] backdrop-blur-md shadow-lg shadow-black/10">
        <div class="text-xl md:text-2xl font-bold tracking-widest font-serif text-white">SCOPE</div>
        
        <nav class="flex items-center space-x-6 text-xs md:text-sm font-medium text-gray-200">
            <a href="#" class="hover:text-[#c5a059] transition">ABOUT</a>
            <a href="#" class="hover:text-[#c5a059] transition">EVENT</a>
            <a href="ここに公式LINEのURL" target="_blank" rel="noopener noreferrer" class="border border-[#c5a059] text-[#c5a059] px-4 py-1.5 rounded hover:bg-[#c5a059] hover:text-[#111e38] transition whitespace-nowrap">LINE登録</a>
        </nav>
    </header>

    <!-- メインビジュアル -->
    <section class="relative bg-[#111e38] text-white py-32 px-6 overflow-hidden min-h-[60vh] flex items-center">
        <!-- 背景のうっすらとした幾何学模様のニュアンス演出 -->
        <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#c5a059_1px,transparent_1px)] [background-size:16px_16px]"></div>
        
        <div class="max-w-4xl mx-auto text-center relative z-10">
            <p class="text-[#c5a059] tracking-[0.2em] text-sm md:text-base font-medium mb-4 font-serif">学生と経営者のビジネス交流会</p>
            <h1 class="text-2xl md:text-4xl font-bold leading-relaxed font-serif tracking-wide mb-8 max-w-5xl mx-auto break-keep">
             経営者の本音に触れ、<br class="md:hidden">キャリアを掴み取る
            </h1>
            <div class="w-16 h-[1px] bg-[#c5a059] mx-auto mb-8"></div>
            <p class="text-sm md:text-lg max-w-2xl mx-auto leading-relaxed text-gray-300">
                SCOPEは、単なる会社説明会ではありません。企業のビジョンや経営者様の「本音」をぶつけ、それに共鳴する学生のポテンシャルを直接見極めていただく、超至近距離のビジネス交流会です。
            </p>
        </div>
    </section>

    <!-- フッター -->
    <footer class="w-full bg-[#111e38] text-gray-400 text-xs text-center py-8 border-t border-gray-800/50 mt-auto">
        <p>&copy; 2026 SCOPE 学生実行委員会. All Rights Reserved.</p>
    </footer>

</body>
</html>
